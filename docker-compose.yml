services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - ./.env:/var/www/html/.env:ro
      - ./storage:/var/www/html/storage # Tambahkan volume storage agar log/upload tidak hilang
    restart: unless-stopped
    healthcheck:
      # Cek langsung via PHP artisan, lebih ringan dan akurat tanpa perlu curl
      test: ["CMD-SHELL", "php artisan migrate:status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  alip-iot-db:
    driver: bridge

volumes:
  mysql_data: