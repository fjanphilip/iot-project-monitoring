services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    ports:
      - 8000:8000
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env:ro
    restart: unless-stopped
    networks:
      - shared-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 512m
    memswap_limit: 512m

networks:
  shared-network:
    external: true
