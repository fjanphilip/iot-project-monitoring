services:
  my_app:
    build:
      context: .
    container_name: laravel_app
    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/var/www/html
      - ./.env:/var/www/html/.env:ro

    command: php artisan serve --host=0.0.0.0 --port=8000

    restart: unless-stopped
