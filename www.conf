[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

; Process management - optimized untuk VPS 1GB
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500
pm.max_requests_grace_period = 30s

; Request timeout
request_terminate_timeout = 60s

; Slow log
slowlog = /dev/stderr
request_slowlog_timeout = 10s

; Status monitoring
pm.status_path = /status

; Clear environment
clear_env = no
